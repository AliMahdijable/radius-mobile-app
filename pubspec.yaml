name: rad_mysvcs
description: MyServices Radius - ISP Subscriber Management
publish_to: 'none'
version: 1.4.7+53

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  socket_io_client: ^3.0.2

  # Navigation
  go_router: ^14.8.1

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # Encryption (CryptoJS compatible)
  pointycastle: ^3.9.1
  convert: ^3.1.2
  crypto: ^3.0.3

  # UI
  # google_fonts removed - using bundled Cairo font
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  percent_indicator: ^4.2.3

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  pdf: ^3.11.1
  printing: ^5.13.3
  pull_to_refresh_flutter3: ^2.0.2
  fluttertoast: ^8.2.10
  file_picker: ^8.1.6
  flutter_native_contact_picker: ^0.0.11

  # Device notifications (expiry / near-expiry), background check
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.9.0+2
  permission_handler: ^11.4.0

  # Firebase Cloud Messaging
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4

  # App icon badge — keeps the launcher icon number in sync with the
  # in-app bell count (unreadCount + dashboard alerts).
  app_badge_plus: ^1.1.5

  # Icons
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/myservice_raduis.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/myservice_raduis.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/myservice_raduis.png

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Variable.ttf
